<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Engagement Invitation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Background Music -->
   <div class="card">
    <audio id="bgMusic" autoplay loop>
        <source src="assets/music.mp3" type="audio/mpeg">
    </audio>

    <button class="music-btn" onclick="toggleMusic()">🔊</button>

    <div class="container">

        <button class="reveal-btn" onclick="revealCard()">Reveal Invitation ✨</button>

        <div class="invite-wrapper hidden">
            <img src="assets/invitation.jpg" class="invite-image" />

            <a href="https://maps.app.goo.gl/HxpERtmKNxCPWd9n8"
            target="_blank"
            class="location-btn">
            📍 Get Directions
            </a>
        </div>
        
    </div>
  </div>
    <div class="petals-back"></div>
    <div class="petals"></div>

  <!-- Floating flowers -->
  

  <!-- Scripts -->
  <script>
    const music = document.getElementById("bgMusic");
    let playing = false;

    /* Start music on first user interaction */
    function startMusicOnce() {
    music.play();
    document.querySelector(".music-btn").innerText = "🔊";
    playing = true;

    document.removeEventListener("click", startMusicOnce);
    document.removeEventListener("touchstart", startMusicOnce);
    }

    document.addEventListener("click", startMusicOnce);
    document.addEventListener("touchstart", startMusicOnce);

    const LOOP_START = 107;
    const LOOP_END = 131;

    // Volume
    music.volume = 0.4;

    // Jump to loop start once metadata is ready
    music.addEventListener("loadedmetadata", () => {
    music.currentTime = LOOP_START;
    });

    // Force looping ONLY inside the window
    music.addEventListener("timeupdate", () => {
    if (music.currentTime >= LOOP_END) {
        music.currentTime = LOOP_START;
    }
    });

    function toggleMusic() {
    if (playing) {
        music.pause();
        document.querySelector(".music-btn").innerText = "🔇";
    } else {
        music.play();
        document.querySelector(".music-btn").innerText = "🔊";
    }
    playing = !playing;
    }
    const petalsFront = document.querySelector(".petals");
    const petalsBack = document.querySelector(".petals-back");
    const flowers = ["🌸", "🌼", "🌺"];

    function createPetal(layer) {
        const petal = document.createElement("span");
        petal.classList.add("petal");

        petal.innerText = flowers[Math.floor(Math.random() * flowers.length)];
        petal.style.left = Math.random() * 100 + "%";

        const size = Math.random() * 10 + 14;
        petal.style.fontSize = size + "px";

        // Speed: back layer slower
        const duration = layer === "back"
            ? Math.random() * 3 + 6  // 6–9s slow
            : Math.random() * 2 + 3; // 3–5s normal

        petal.style.animationDuration = duration + "s";

        const drift = (Math.random() * 60 - 30) + "px";
        petal.style.setProperty("--drift", drift);

        if (layer === "back") {
            petal.style.opacity = 0.45;
            petalsBack.appendChild(petal);
        } else {
            petal.style.opacity = 0.9;
            petalsFront.appendChild(petal);
        }

        setTimeout(() => petal.remove(), duration * 1000);
    }

    // Back (slow)
    setInterval(() => createPetal("back"), 600);

    // Front (normal)
    setInterval(() => createPetal("front"), 300);

    function revealCard() {

        const wrapper = document.querySelector(".invite-wrapper");
        const btn = document.querySelector(".reveal-btn");
        // const viewLocation = document.getElementById("viewLocation");
        // viewLocation.classList.remove("hidden");

        wrapper.classList.remove("hidden");

        btn.style.opacity = "0";
        btn.style.transform = "scale(0.9)";

        setTimeout(() => btn.remove(), 400);
    }
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Engagement Invitation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Background Music -->
   <div class="card">
    <audio id="bgMusic" autoplay loop>
        <source src="assets/music.mp3" type="audio/mpeg">
    </audio>

    <button class="music-btn" onclick="toggleMusic()">🔊</button>

    <div class="container">

        <img src="assets/ganesha.png" class="ganesha" alt="Ganesha">

        <button class="reveal-btn" onclick="revealNames()">Reveal the Couple ✨</button>

        <div class="names hidden">
            <div class="name-text">Sunanda</div>

            <div class="heart-pulse">💞</div>

            <div class="name-text">Shashank</div>
        </div>
        

        <p class="invite english lang" style="display:block">
        We cordially invite you and your family to grace our engagement
        ceremony with your presence and blessings.
        </p>

        <div class="details">
        <p>📅 <strong>Date:</strong> 08 March 2026</p>
        <p>⏰ <strong>Time:</strong> 11:00 AM onwards</p>
        <p>📍 <strong>Venue:</strong> Sairam Function Hall</p>

        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3641.8273803445327!2d77.99393827490701!3d16.1997623844989!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3bca00989f0b2c7b%3A0xa4f859e83fda082a!2sSairam%20Function%20Hall!5e1!3m2!1sen!2sin!4v1772549498810!5m2!1sen!2sin" width="400" height="300" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>

        <p class="footer">
        With love & blessings 💐<br/>
        – Family
        </p>        
    </div>
  </div>
    <div class="petals-back"></div>
    <div class="petals"></div>

  <!-- Floating flowers -->
  

  <!-- Scripts -->
  <script>
    const music = document.getElementById("bgMusic");
    let playing = false;

    /* Start music on first user interaction */
    function startMusicOnce() {
    music.play();
    document.querySelector(".music-btn").innerText = "🔊";
    playing = true;

    document.removeEventListener("click", startMusicOnce);
    document.removeEventListener("touchstart", startMusicOnce);
    }

    document.addEventListener("click", startMusicOnce);
    document.addEventListener("touchstart", startMusicOnce);

    const LOOP_START = 107;
    const LOOP_END = 131;

    // Volume
    music.volume = 0.4;

    // Jump to loop start once metadata is ready
    music.addEventListener("loadedmetadata", () => {
    music.currentTime = LOOP_START;
    });

    // Force looping ONLY inside the window
    music.addEventListener("timeupdate", () => {
    if (music.currentTime >= LOOP_END) {
        music.currentTime = LOOP_START;
    }
    });

    function toggleMusic() {
    if (playing) {
        music.pause();
        document.querySelector(".music-btn").innerText = "🔇";
    } else {
        music.play();
        document.querySelector(".music-btn").innerText = "🔊";
    }
    playing = !playing;
    }
    const petalsFront = document.querySelector(".petals");
    const petalsBack = document.querySelector(".petals-back");
    const flowers = ["🌸", "🌼", "🌺"];

    function createPetal(layer) {
        const petal = document.createElement("span");
        petal.classList.add("petal");

        petal.innerText = flowers[Math.floor(Math.random() * flowers.length)];
        petal.style.left = Math.random() * 100 + "%";

        const size = Math.random() * 10 + 14;
        petal.style.fontSize = size + "px";

        // Speed: back layer slower
        const duration = layer === "back"
            ? Math.random() * 3 + 6  // 6–9s slow
            : Math.random() * 2 + 3; // 3–5s normal

        petal.style.animationDuration = duration + "s";

        const drift = (Math.random() * 60 - 30) + "px";
        petal.style.setProperty("--drift", drift);

        if (layer === "back") {
            petal.style.opacity = 0.45;
            petalsBack.appendChild(petal);
        } else {
            petal.style.opacity = 0.9;
            petalsFront.appendChild(petal);
        }

        setTimeout(() => petal.remove(), duration * 1000);
    }

    // Back (slow)
    setInterval(() => createPetal("back"), 600);

    // Front (normal)
    setInterval(() => createPetal("front"), 300);

    function revealNames() {
        const names = document.querySelector(".names");
        const btn = document.querySelector(".reveal-btn");
        const heart = document.querySelector(".heart-pulse");

        // Show names
        names.classList.remove("hidden");
        names.classList.add("show");

        // Remove button
        btn.style.opacity = "0";
        btn.style.transform = "scale(0.9)";
        setTimeout(() => btn.remove(), 400);

        // Heart pulse (once)
        setTimeout(() => {
            heart.classList.add("show");
        }, 500);

        heart.classList.add("pulse");
        heart.classList.remove("names");
        setTimeout(() => heart.classList.remove("pulse"), 1200);
    }
  </script>

</body>
</html>
